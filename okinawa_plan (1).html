// Simple map using SVG + OpenStreetMap tile via img
function MapView({ activeDay }) {
  const c = DAY_COLORS[activeDay];
  const spots = SPOTS[`day${activeDay}`];
  const [selectedSpot, setSelectedSpot] = useState(null);
  const [copied, setCopied] = useState(false);

  // Compute bounding box
  const lats = spots.map(s=>s.lat);
  const lngs = spots.map(s=>s.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const padLat = (maxLat-minLat)*0.15 || 0.05;
  const padLng = (maxLng-minLng)*0.15 || 0.05;
  const bLat = [minLat-padLat, maxLat+padLat];
  const bLng = [minLng-padLng, maxLng+padLng];

  const W = 360, H = 300;
  const toX = lng => ((lng-bLng[0])/(bLng[1]-bLng[0]))*W;
  const toY = lat => H - ((lat-bLat[0])/(bLat[1]-bLat[0]))*H;

  // Build polyline points
  const linePoints = spots.map(s=>`${toX(s.lng)},${toY(s.lat)}`).join(" ");

  const copyAddress = (addr) => {
    navigator.clipboard.writeText(addr).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    });
  };

  useEffect(() => { setSelectedSpot(null); }, [activeDay]);

  return (
    <div style={{marginBottom:20}}>
      {/* Map area */}
      <div style={{background:"#E8F4FD",borderRadius:16,overflow:"hidden",position:"relative",border:`2px solid ${c.main}40`}}>
        {/* OSM background hint */}
        <div style={{position:"absolute",top:8,right:8,fontSize:10,color:"#999",zIndex:2,background:"rgba(255,255,255,0.8)",padding:"2px 6px",borderRadius:8}}>
          © OpenStreetMap
        </div>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",background:"linear-gradient(180deg,#C8E6FA 0%,#A8D5F5 40%,#8BC4F0 100%)"}}>
          {/* Ocean/land simplified background */}
          <rect width={W} height={H} fill="#B8DFF5"/>
          {/* Simple Okinawa island shape hint */}
          <ellipse cx={W*0.5} cy={H*0.45} rx={W*0.35} ry={H*0.38} fill="#C8E6B0" opacity="0.6"/>

          {/* Route line */}
          <polyline points={linePoints} fill="none" stroke={c.line} strokeWidth="2.5" strokeDasharray="6,4" opacity="0.8"/>

          {/* Spot markers */}
          {spots.map((s,i)=>{
            const x=toX(s.lng), y=toY(s.lat);
            const isSelected = selectedSpot===i;
            return (
              <g key={i} style={{cursor:"pointer"}} onClick={()=>setSelectedSpot(isSelected?null:i)}>
                <circle cx={x} cy={y} r={isSelected?14:10} fill="#fff" stroke={c.main} strokeWidth={isSelected?3:2} filter={isSelected?"url(#shadow)":"none"}/>
                <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize={isSelected?10:8} fontWeight="700" fill={c.main}>{i+1}</text>
                {isSelected&&(
                  <circle cx={x} cy={y} r="18" fill={c.main} opacity="0.15"/>
                )}
              </g>
            );
          })}
          <defs>
            <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" floodOpacity="0.3"/>
            </filter>
          </defs>
        </svg>

        {/* Legend */}
        <div style={{padding:"8px 12px",background:"rgba(255,255,255,0.9)",display:"flex",gap:6,flexWrap:"wrap"}}>
          {spots.map((s,i)=>(
            <button key={i} onClick={()=>setSelectedSpot(selectedSpot===i?null:i)} style={{
              background:selectedSpot===i?c.main:"#fff",
              color:selectedSpot===i?"#fff":c.main,
              border:`1.5px solid ${c.main}`,
              borderRadius:20,padding:"3px 10px",
              fontSize:11,fontWeight:700,cursor:"pointer",
              transition:"all 0.2s",
            }}>
              {i+1}. {s.name.replace("ホテルみゆきビーチ","みゆきビーチ").replace("Sweetレンタカー那覇空港店","レンタカー").replace("Sweetレンタカー返却","レンタカー返却")}
            </button>
          ))}
        </div>
      </div>

      {/* Spot detail popup */}
      {selectedSpot !== null && (
        <div style={{
          background:"#fff",borderRadius:16,padding:"16px",marginTop:10,
          boxShadow:"0 4px 20px rgba(0,0,0,0.1)",
          border:`2px solid ${c.main}`,
          animation:"slideUp 0.2s ease",
        }}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:12,color:c.main,fontWeight:700,marginBottom:2}}>📍 {spots[selectedSpot].time}</div>
              <div style={{fontSize:16,fontWeight:800,color:"#222"}}>{spots[selectedSpot].name}</div>
            </div>
            <button onClick={()=>setSelectedSpot(null)} style={{background:"#f0f0f0",border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:14,color:"#666"}}>×</button>
          </div>
          <div style={{
            background:"#F8F8F8",borderRadius:10,padding:"10px 12px",marginTop:10,
            display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,
          }}>
            <span style={{fontSize:12,color:"#555",flex:1,lineHeight:1.5}}>🗺 {spots[selectedSpot].address}</span>
            <button
              onClick={()=>copyAddress(spots[selectedSpot].address)}
              style={{
                background:copied?c.main:"#fff",
                color:copied?"#fff":c.main,
                border:`1.5px solid ${c.main}`,
                borderRadius:20,padding:"5px 12px",
                fontSize:12,fontWeight:700,cursor:"pointer",
                whiteSpace:"nowrap",transition:"all 0.2s",
                flexShrink:0,
              }}
            >
              {copied?"✅ コピー済み":"📋 コピー"}
            </button>
          </div>
          <div style={{fontSize:12,color:"#666",marginTop:8,lineHeight:1.6}}>{spots[selectedSpot].note}</div>
          <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
            {spots[selectedSpot].duration!=="—"&&<span style={{fontSize:11,background:c.light,color:c.main,padding:"3px 10px",borderRadius:20,fontWeight:600}}>⏱ {spots[selectedSpot].duration}</span>}
            {spots[selectedSpot].fee!=="—"&&<span style={{fontSize:11,background:"#FFF8E1",color:"#E65100",padding:"3px 10px",borderRadius:20,fontWeight:600}}>💰 {spots[selectedSpot].fee}</span>}
          </div>
          {spots[selectedSpot].meal&&<div style={{fontSize:12,color:"#FF8C00",marginTop:8,background:"#FFF8E1",padding:"8px 12px",borderRadius:10,fontWeight:600}}>{spots[selectedSpot].meal}</div>}
          {/* Google Maps link */}
          <a
            href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spots[selectedSpot].address)}`}
            target="_blank"
            rel="noopener noreferrer"
            style={{display:"block",marginTop:10,textAlign:"center",background:`linear-gradient(135deg,${c.main},${c.accent||c.main})`,color:"#fff",padding:"8px",borderRadius:10,fontSize:13,fontWeight:700,textDecoration:"none"}}
          >
            🗺 Google マップで開く
          </a>
        </div>
      )}
    </div>
  );
}

              {/* Tappable name */}
              <div
                onClick={()=>setOpenSpot(openSpot===i?null:i)}

        <div style={{background:`linear-gradient(135deg,${c.light},#fff)`,border:`1.5px solid ${c.main}40`,borderRadius:16,padding:"16px",marginBottom:16}}>
          <h3 style={{fontSize:13,fontWeight:800,color:c.main,letterSpacing:2,marginBottom:8}}>🏨 ホテル周辺Tips</h3>
          <p style={{fontSize:13,color:"#444",lineHeight:1.7,margin:0}}>{hotelTips[activeDay]}</p>

      {activeDay===3&&(
        <>
          <div style={{background:"linear-gradient(135deg,#FFF3E0,#FFF9C4)",borderRadius:16,padding:"16px",marginBottom:16}}>
            <h3 style={{fontSize:13,fontWeight:800,color:"#E65100",letterSpacing:2,marginBottom:10}}>🌺 6月沖縄のポイント</h3>
            {["☀️ 6月は梅雨明け直後！エメラルドの海が最もきれいな季節","🥭 マンゴー・パイナップルが旬。地場スーパーで買うのが一番安い","🌊 海水温が上がり始め、シュノーケルも快適に","🌸 梅雨の晴れ間は蒸し暑い。日焼け止め・水分補給を忘れずに"].map((t,i)=>(
              <div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6}}>{t}</div>
            ))}
          </div>
          <div style={{background:"linear-gradient(135deg,#F3E5F5,#FCE4EC)",borderRadius:16,padding:"16px",marginBottom:16}}>
            <h3 style={{fontSize:13,fontWeight:800,color:"#7B1FA2",letterSpacing:2,marginBottom:10}}>🛍️ 国際通りで外せない</h3>
            {["🍬 御菓子御殿のちんすこう・紅芋タルト（定番中の定番）","🥃 泡盛の試飲ができる酒屋で地元銘柄をゲット","🐷 牧志公設市場で沖縄食材を見学（豚の顔まるごと売ってる！）","🌺 むつみ橋通りの地元食堂で本場の沖縄そばを"].map((t,i)=>(
              <div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6}}>{t}</div>

          </div>
          <div style={{background:"linear-gradient(135deg,#FFEBEE,#FFF3E0)",borderRadius:16,padding:"16px",marginBottom:16}}>

            {["🚗 沖縄の渋滞は読めない。特に国道58号は土日要注意","☀️ 紫外線が本州の約1.5倍。日焼け止めは必携","🐍 ハブに注意。草むらや石の隙間には手を入れない","⛽ ガソリンスタンドは内地より少ない。返却前に給油を忘れずに","🌊 遊泳は指定ビーチで。離岸流が発生しやすいエリアあり"].map((t,i)=>(

      {activeDay!==3&&<div style={{textAlign:"center",fontSize:13,color:"#999",padding:"8px 0"}}>💡 6月のTips・国際通り情報・注意事項はDay3タブで確認できます</div>}
    </div>
  );
}

function CostView() {
  const admissionTotal3 = COSTS.admission.reduce((s,i)=>s+i.per*3,0);
  const mealMin = COSTS.meals.reduce((s,i)=>s+i.min*3,0);
  const mealMax = COSTS.meals.reduce((s,i)=>s+i.max*3,0);
  const otherMin = COSTS.other.reduce((s,i)=>s+i.min,0);
  const otherMax = COSTS.other.reduce((s,i)=>s+i.max,0);
  const totalMin = admissionTotal3+mealMin+otherMin;
  const totalMax = admissionTotal3+mealMax+otherMax;
  return (
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{background:"linear-gradient(135deg,#FF8C00,#FFB300)",borderRadius:16,padding:"20px",marginBottom:20,boxShadow:"0 4px 20px rgba(255,140,0,0.3)",textAlign:"center"}}>
        <div style={{color:"rgba(255,255,255,0.85)",fontSize:12,letterSpacing:2,fontWeight:600}}>現地での追加費用（3名合計）</div>
        <div style={{color:"#fff",fontSize:30,fontWeight:900,margin:"4px 0"}}>¥{totalMin.toLocaleString()} 〜 ¥{totalMax.toLocaleString()}</div>
        <div style={{color:"rgba(255,255,255,0.8)",fontSize:12}}>※航空券・ホテル・レンタカーはパック済み</div>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <h3 style={{fontSize:13,fontWeight:800,color:"#4CAF50",letterSpacing:2,marginBottom:12}}>✅ パック込み（追加費用なし）</h3>
        {["✈️ 往復航空券（3名） — ANA パック込み","🏨 ホテル2泊（1室） — ホテルみゆきビーチ 素泊まり","🚗 レンタカー（2泊3日） — Sweetレンタカー 免責込み"].map((t,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<2?"1px solid #f5f5f5":"none"}}>
            <div style={{fontSize:13,color:"#333"}}>{t}</div>
            <div style={{fontSize:13,fontWeight:700,color:"#4CAF50",background:"#F1F8E9",padding:"4px 10px",borderRadius:20}}>込み済み</div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <h3 style={{fontSize:13,fontWeight:800,color:"#FF6B6B",letterSpacing:2,marginBottom:4}}>🎟️ 入場料（3名合計）</h3>
        <div style={{fontSize:11,color:"#999",marginBottom:12}}>※1名あたりの料金 × 3名</div>
        {COSTS.admission.map((item,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<COSTS.admission.length-1?"1px solid #f5f5f5":"none"}}>
            <div><div style={{fontSize:13,fontWeight:600,color:"#333"}}>{item.label}</div><div style={{fontSize:11,color:"#888"}}>{item.per.toLocaleString()}円/人</div></div>
            <div style={{fontSize:14,fontWeight:700,color:"#FF6B6B"}}>¥{(item.per*3).toLocaleString()}</div>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,paddingTop:10,borderTop:"2px solid #FF6B6B30"}}>
          <div style={{fontSize:13,fontWeight:800,color:"#FF6B6B"}}>入場料 合計</div>
          <div style={{fontSize:16,fontWeight:900,color:"#FF6B6B"}}>¥{admissionTotal3.toLocaleString()}</div>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <h3 style={{fontSize:13,fontWeight:800,color:"#FF8C00",letterSpacing:2,marginBottom:4}}>🍽️ 食事代（3名合計）</h3>
        <div style={{fontSize:11,color:"#999",marginBottom:12}}>※2日目夕食は実家でご馳走になる想定で除外</div>
        {COSTS.meals.map((item,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<COSTS.meals.length-1?"1px solid #f5f5f5":"none"}}>
            <div><div style={{fontSize:13,fontWeight:600,color:"#333"}}>{item.label}</div><div style={{fontSize:11,color:"#888"}}>{item.note}</div></div>
            <div style={{fontSize:12,fontWeight:700,color:"#FF8C00",textAlign:"right"}}>¥{(item.min*3).toLocaleString()}〜<br/>¥{(item.max*3).toLocaleString()}</div>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"2px solid #FF8C0020"}}>
          <div style={{fontSize:13,fontWeight:800,color:"#FF8C00"}}>食事代 合計</div>

      <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <h3 style={{fontSize:13,fontWeight:800,color:"#4ECDC4",letterSpacing:2,marginBottom:12}}>🗂️ その他費用</h3>

          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<COSTS.other.length-1?"1px solid #f5f5f5":"none"}}>

          </div>
        ))}
      </div>
      <div style={{background:"linear-gradient(135deg,#E8F5E9,#F1F8E9)",borderRadius:16,padding:"16px",marginBottom:20,border:"1.5px solid #81C78440"}}>
        <h3 style={{fontSize:13,fontWeight:800,color:"#2E7D32",letterSpacing:2,marginBottom:10}}>💡 節約Tips</h3>
        {["🎟️ 美ら海水族館はじゃらん等の割引クーポンで1割引になることも","🥭 フルーツはスーパーで買うと市場の半額以下","⛽ ガソリンはレンタカー返却前に満タン。空港近くは割高なので要注意","🍜 沖縄そばは地元食堂なら700〜900円。観光地は1,200円〜","🛍️ お土産はスーパーが最安。ちんすこうは業務用パックがお得"].map((t,i,a)=>(
          <div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6,borderBottom:i<a.length-1?"1px solid #C8E6C940":"none"}}>{t}</div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [activeDay, setActiveDay] = useState(1);
  const [activeTab, setActiveTab] = useState("schedule"); // schedule | map | cost
  const [loaded, setLoaded] = useState(false);
  useEffect(()=>{ setTimeout(()=>setLoaded(true),100); },[]);
  const c = DAY_COLORS[activeDay];
  const days = [1,2,3];
  const dayLabels = ["6/5(金)","6/6(土)","6/7(日)"];
  const dayEmojis = ["🌺","🐠","🦋"];
  const dayThemes = ["到着＆中部満喫","北部＆実家訪問","南部観光＆帰路"];

  return (
    <div style={{opacity:loaded?1:0,transition:"opacity 0.5s ease",paddingBottom:40}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${c.main} 0%,${c.accent} 100%)`,padding:"24px 16px 0",textAlign:"center",position:"relative",overflow:"hidden",transition:"background 0.4s ease"}}>
        <div style={{position:"absolute",top:-10,left:-10,fontSize:60,opacity:0.08,transform:"rotate(-20deg)"}}>🌺</div>
        <div style={{position:"absolute",bottom:-10,right:-10,fontSize:60,opacity:0.08,transform:"rotate(20deg)"}}>🌊</div>
        <div style={{color:"rgba(255,255,255,0.85)",fontSize:12,letterSpacing:4,fontWeight:600,marginBottom:2}}>2026.06.05 - 06.07</div>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:900,margin:"0 0 2px",textShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>🌺 沖縄3日間 旅行プラン</h1>
        <div style={{color:"rgba(255,255,255,0.85)",fontSize:12,marginBottom:14}}>大人3名 · ホテルみゆきビーチ · レンタカー旅</div>

        {/* Day selector */}
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>
          {days.map((d,i)=>(
            <button key={d} onClick={()=>setActiveDay(d)} style={{
              background:activeDay===d?"rgba(255,255,255,0.95)":"rgba(255,255,255,0.2)",
              color:activeDay===d?c.main:"#fff",
              border:"none",borderRadius:20,padding:"6px 14px",
              fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.3s",
            }}>
              {dayEmojis[i]} Day{d} {dayLabels[i]}
            </button>
          ))}
        </div>

        {/* Theme */}
        <div style={{color:"rgba(255,255,255,0.9)",fontSize:14,fontWeight:700,marginBottom:12}}>
          {dayEmojis[activeDay-1]} {dayThemes[activeDay-1]}
        </div>

        {/* Tab bar */}
        <div style={{display:"flex",justifyContent:"center",gap:4}}>
          {[["schedule","📋 スケジュール"],["map","🗺️ 地図"],["cost","💰 費用"]].map(([tab,label])=>(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{
              background:activeTab===tab?"#fff":"rgba(255,255,255,0.2)",
              color:activeTab===tab?c.main:"#fff",
              border:"none",borderRadius:"12px 12px 0 0",
              padding:"8px 16px 12px",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.2s",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:640,margin:"0 auto",padding:"16px 16px 0"}}>
        {activeTab==="schedule"&&<ScheduleView activeDay={activeDay}/>}
        {activeTab==="map"&&<MapView activeDay={activeDay}/>}
        {activeTab==="cost"&&<CostView/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
