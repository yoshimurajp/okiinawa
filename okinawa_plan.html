              <h3 style={{fontSize:13,fontWeight:800,color:"#2E7D32",letterSpacing:2,marginBottom:10}}>💡 節約Tips</h3>
              {["🎟️ 美ら海水族館はじゃらん等の割引クーポンで1割引になることも","🥭 フルーツはスーパーで買うと市場の半額以下","⛽ ガソリンはレンタカー返却前に満タン。空港近くは割高なので要注意","🍜 沖縄そばは地元食堂なら700〜900円。観光地は1,200円〜","🛍️ お土産はスーパーが最安。ちんすこうは業務用パックがお得"].map((t,i,a) => (
                <div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6,borderBottom:i<a.length-1?"1px solid #C8E6C940":"none"}}>{t}</div>
              ))}
            </div>
          </div>
        )}

        {/* PLAN TAB */}
        {activeTab === "plan" && (
          <>
            {/* Theme */}
            <div style={{background:c.light,border:`2px solid ${c.main}`,borderRadius:"0 0 16px 16px",padding:"12px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:24}}>{day.emoji}</span>
              <div>
                <div style={{fontSize:11,color:c.main,fontWeight:700,letterSpacing:2}}>DAY {day.day} THEME</div>
                <div style={{fontSize:16,fontWeight:800,color:"#333"}}>{day.theme}</div>
              </div>
            </div>
            {/* Schedule */}
            <div style={{marginBottom:24}}>
              <h2 style={{fontSize:14,fontWeight:800,color:c.main,letterSpacing:2,marginBottom:12}}>🕐 タイムスケジュール</h2>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",left:42,top:0,bottom:0,width:2,background:`${c.main}30`}}/>
                {day.schedule.map((item,i) => (
                  <div key={i} style={{display:"flex",gap:12,marginBottom:12,animation:`fadeIn 0.4s ease ${i*0.05}s both`}}>
                    <div style={{minWidth:60,textAlign:"right",fontSize:12,fontWeight:700,color:c.main,paddingTop:12}}>{item.time}</div>
                    <div style={{width:16,height:16,borderRadius:"50%",background:item.meal?"#FFD700":c.main,border:"3px solid #fff",boxShadow:`0 0 0 2px ${c.main}`,marginTop:10,flexShrink:0,zIndex:1}}/>
                    <div style={{background:"#fff",borderRadius:12,padding:"10px 14px",flex:1,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:`1px solid ${c.main}20`}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#222"}}>{item.spot}</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",margin:"4px 0"}}>
                        {item.duration!=="—"&&<span style={{fontSize:11,background:c.light,color:c.main,padding:"2px 8px",borderRadius:20,fontWeight:600}}>⏱ {item.duration}</span>}
                        {item.fee!=="—"&&<span style={{fontSize:11,background:"#FFF8E1",color:"#E65100",padding:"2px 8px",borderRadius:20,fontWeight:600}}>💰 {item.fee}</span>}
                      </div>
                      <div style={{fontSize:12,color:"#555",lineHeight:1.5}}>{item.note}</div>
                      {item.meal&&<div style={{fontSize:12,color:"#FF8C00",marginTop:6,background:"#FFF8E1",padding:"6px 10px",borderRadius:8,fontWeight:600}}>{item.meal}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            {/* Detour */}
            <div style={{background:"#fff",borderRadius:16,padding:"16px",marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
              <h3 style={{fontSize:13,fontWeight:800,color:c.main,letterSpacing:2,marginBottom:10}}>🗺️ ルート沿いのおすすめ立ち寄り</h3>
              {day.detour.map((d,i) => (
                <div key={i} style={{fontSize:13,color:"#444",padding:"6px 0",borderBottom:i<day.detour.length-1?"1px solid #f0f0f0":"none",lineHeight:1.6}}>✨ {d}</div>
              ))}
            </div>
            {/* Hotel tips */}
            {day.hotel_tips&&(
              <div style={{background:`linear-gradient(135deg,${c.light},#fff)`,border:`1.5px solid ${c.main}40`,borderRadius:16,padding:"16px",marginBottom:16}}>
                <h3 style={{fontSize:13,fontWeight:800,color:c.main,letterSpacing:2,marginBottom:8}}>🏨 ホテル周辺Tips</h3>
                <p style={{fontSize:13,color:"#444",lineHeight:1.7,margin:0}}>{day.hotel_tips}</p>
              </div>
            )}
            {/* Day3 extras */}
            {activeDay===3&&(
              <>
                <div style={{background:"linear-gradient(135deg,#FFF3E0,#FFF9C4)",borderRadius:16,padding:"16px",marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                  <h3 style={{fontSize:13,fontWeight:800,color:"#E65100",letterSpacing:2,marginBottom:10}}>🌺 6月沖縄のポイント</h3>
                  {PLAN_DATA.june_tips.map((t,i)=><div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6}}>{t}</div>)}
                </div>
                <div style={{background:"linear-gradient(135deg,#F3E5F5,#FCE4EC)",borderRadius:16,padding:"16px",marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                  <h3 style={{fontSize:13,fontWeight:800,color:"#7B1FA2",letterSpacing:2,marginBottom:10}}>🛍️ 国際通りで外せない</h3>
                  {PLAN_DATA.kokusaidori_must.map((t,i)=><div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6}}>{t}</div>)}
                </div>
                <div style={{background:"linear-gradient(135deg,#FFEBEE,#FFF3E0)",borderRadius:16,padding:"16px",marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                  <h3 style={{fontSize:13,fontWeight:800,color:"#C62828",letterSpacing:2,marginBottom:10}}>⚠️ 注意事項</h3>
                  {PLAN_DATA.cautions.map((t,i)=><div key={i} style={{fontSize:13,color:"#444",padding:"5px 0",lineHeight:1.6}}>{t}</div>)}
                </div>
                <div style={{background:"linear-gradient(135deg,#4ECDC4,#2196F3)",borderRadius:16,padding:"20px",marginBottom:16,boxShadow:"0 4px 20px rgba(78,205,196,0.3)"}}>
                  <h3 style={{fontSize:13,fontWeight:800,color:"rgba(255,255,255,0.9)",letterSpacing:2,marginBottom:8}}>🏆 この旅のイチ押し</h3>
                  <div style={{fontSize:16,fontWeight:900,color:"#fff",marginBottom:8}}>{PLAN_DATA.top_pick.spot}</div>
                  <div style={{fontSize:13,color:"rgba(255,255,255,0.9)",lineHeight:1.7}}>{PLAN_DATA.top_pick.reason}</div>
                </div>
              </>
            )}
            {activeDay!==3&&<div style={{textAlign:"center",fontSize:13,color:"#999",padding:"8px 0"}}>💡 6月のTips・国際通り情報・注意事項はDay3タブで確認できます</div>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
